<ol>
<li><p>在使用pip install pycurl是报curl_config no found错误</p>
</li>
<li><p>gnutls.h: No such file or directory</p>
</li>
</ol>
<p>解决办法：</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">sudo apt-get install libcurl4-gnutls-dev</span><br><span class="line">sudo apt-get install libghc-gnutls-dev</span><br></pre></td></tr></table></figure>

<p>最后通过pip进行安装：</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">pip install pycurl</span><br></pre></td></tr></table></figure>

<p>(完)</p>

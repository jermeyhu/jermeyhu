<p>ajax的兴起，js在开发中的地位越来越高，但是随着而来的是冗长而不可折叠的代码出现。<code>Advanced JavaScript outlining（JSOutlining）</code> 插件很好地补缺了这一块功能，它使得我们可以有序地折叠js和css代码，就像我们对付C#代码一样！</p>

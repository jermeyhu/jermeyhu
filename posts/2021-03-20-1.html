<p>如一个简单css语句</p>
<figure class="highlight css"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="selector-class">.welcome</span> &#123; <span class="attribute">width</span>: <span class="number">420px</span>; <span class="attribute">height</span>: <span class="number">235px</span>; <span class="attribute">background</span>: <span class="built_in">url</span>(<span class="string">../img/welcome.jpg</span>) <span class="number">0</span> <span class="number">0</span> no-repeat;</span><br></pre></td></tr></table></figure>

<p>但是打包后路径成了却出现404访问不到的问题。</p>
<p>解决的办法很简单</p>
<p>build路径下utils.js文件</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">// Extract CSS when that option is specified</span></span><br><span class="line"> <span class="comment">// (which is the case during production build)</span></span><br><span class="line"> <span class="keyword">if</span> (options.extract) &#123;</span><br><span class="line">  <span class="keyword">return</span> ExtractTextPlugin.extract(&#123;</span><br><span class="line">  use: loaders,</span><br><span class="line">  fallback: <span class="string">&#x27;vue-style-loader&#x27;</span>,</span><br><span class="line">  publicPath:<span class="string">&#x27;../../&#x27;</span>   <span class="comment">//添加此代码！！！</span></span><br><span class="line">  &#125;)</span><br><span class="line"> &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">  <span class="keyword">return</span> [<span class="string">&#x27;vue-style-loader&#x27;</span>].concat(loaders)</span><br><span class="line"> &#125;</span><br></pre></td></tr></table></figure>
<p> (完)</p>

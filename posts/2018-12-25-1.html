<!DOCTYPE html><html><head><meta http-equiv="content-type" content="text/html; charset=utf-8"><meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport"><meta content="yes" name="apple-mobile-web-app-capable"><meta content="black-translucent" name="apple-mobile-web-app-status-bar-style"><meta content="telephone=no" name="format-detection"><meta name="description" content="直接上代码："><link rel="stylesheet" type="text/css" href="/css/normalize.css"><link rel="stylesheet" type="text/css" href="/css/highlight.css"><link rel="stylesheet" type="text/css" href="/css/noise.css"><title>C#去掉HTML标记 | 四少爷的blog</title><link rel="Shortcut Icon" type="image/x-icon" href="/favicon.ico"><link rel="alternate" type="application/atom+xml" href="/atom.xml"><meta name="generator" content="Hexo 5.4.0"></head><body><article class="wrapper"><div class="post-main"><div class="nav"><nav class="container"><a class="sidebar-nav-item active" href="/">首页</a><a class="sidebar-nav-item" href="/archives">归档</a><a class="sidebar-nav-item" href="/friends">友链</a></nav><div class="container post-meta"><div class="post-tags"><a class="post-tag-none-link" href="/tags/csharp/" rel="tag">C#</a></div><div class="post-time">2018-12-24</div></div></div><div class="container post-header"><h1>C#去掉HTML标记</h1></div><div class="container post-content"><p>直接上代码：</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br></pre></td><td class="code"><pre><span class="line">public string RemoveHTMLTags(string htmlStream)</span><br><span class="line">        &#123;</span><br><span class="line">            if (htmlStream &#x3D;&#x3D; null)</span><br><span class="line">            &#123;</span><br><span class="line">                throw new Exception(&quot;Your input html stream is null!&quot;);</span><br><span class="line">                return null;</span><br><span class="line">            &#125;</span><br><span class="line">            &#x2F;*</span><br><span class="line">             * 最好把所有的特殊HTML标记都找出来，然后把与其相对应的Unicode字符一起影射到Hash表内，最后一起都替换掉</span><br><span class="line">             *&#x2F;</span><br><span class="line">            &#x2F;&#x2F;先单独测试,成功后,再把所有模式合并</span><br><span class="line">            &#x2F;&#x2F;注:这两个必须单独处理</span><br><span class="line">            &#x2F;&#x2F;去掉嵌套了HTML标记的JavaScript:(&lt;script)[\\s\\S]*(&lt;&#x2F;script&gt;)</span><br><span class="line">            &#x2F;&#x2F;去掉css标记:(&lt;style)[\\s\\S]*(&lt;&#x2F;style&gt;)</span><br><span class="line">            &#x2F;&#x2F;去掉css标记:\\..*\\&#123;[\\s\\S]*\\&#125;</span><br><span class="line">            htmlStream &#x3D; Regex.Replace(htmlStream, &quot;(&lt;script)[\\s\\S]*?(&lt;&#x2F;script&gt;)|(&lt;style)[\\s\\S]*?(&lt;&#x2F;style&gt;)&quot;, &quot; &quot;, RegexOptions.IgnoreCase);</span><br><span class="line">            &#x2F;&#x2F;htmlStream &#x3D; RemoveTag(htmlStream, &quot;script&quot;);</span><br><span class="line">            &#x2F;&#x2F;htmlStream &#x3D; RemoveTag(htmlStream, &quot;style&quot;);</span><br><span class="line">            &#x2F;&#x2F;去掉普通HTML标记:&lt;[^&gt;]+&gt;</span><br><span class="line">            &#x2F;&#x2F;替换空格:&amp;nbsp;|&amp;|&amp;shy;|&amp;#160;|&amp;#173;</span><br><span class="line">            htmlStream &#x3D; Regex.Replace(htmlStream, &quot;&lt;[^&gt;]+&gt;|&amp;nbsp;|&amp;|&amp;shy;|&amp;#160;|&amp;#173;|&amp;bull;|&lt;|&gt;&quot;, &quot; &quot;, RegexOptions.IgnoreCase);</span><br><span class="line">            &#x2F;&#x2F;htmlStream &#x3D; RemoveTag(htmlStream);</span><br><span class="line">            &#x2F;&#x2F;替换左尖括号</span><br><span class="line">            &#x2F;&#x2F;htmlStream &#x3D; Regex.Replace(htmlStream, &quot;&lt;&quot;, &quot;&lt;&quot;);</span><br><span class="line">            &#x2F;&#x2F;替换右尖括号</span><br><span class="line">            &#x2F;&#x2F;htmlStream &#x3D; Regex.Replace(htmlStream, &quot;&gt;&quot;, &quot;&gt;&quot;);</span><br><span class="line">            &#x2F;&#x2F;替换空行</span><br><span class="line">            &#x2F;&#x2F;htmlStream &#x3D; Regex.Replace(htmlStream, &quot;[\n|\r|\t]&quot;, &quot; &quot;);&#x2F;&#x2F;[\n|\r][\t*| *]*[\n|\r]</span><br><span class="line">            htmlStream &#x3D; Regex.Replace(htmlStream, &quot;(\r\n[\r|\n|\t| ]*\r\n)|(\n[\r|\n|\t| ]*\n)&quot;, &quot;\r\n&quot;);</span><br><span class="line">            htmlStream &#x3D; Regex.Replace(htmlStream, &quot;[\t| ]&#123;1,&#125;&quot;, &quot; &quot;);</span><br><span class="line">            return htmlStream.Trim();</span><br><span class="line">        &#125;</span><br></pre></td></tr></table></figure></div></div></article><link rel="stylesheet" type="text/css" href="/font-awesome-4.7.0/css/font-awesome.min.css"></body></html>

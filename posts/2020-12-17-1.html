&lt;p&gt;该命令的用法比较简单，比如：&lt;/p&gt;
&lt;figure class=&quot;highlight css&quot;&gt;&lt;table&gt;&lt;tr&gt;&lt;td class=&quot;gutter&quot;&gt;&lt;pre&gt;&lt;span class=&quot;line&quot;&gt;1&lt;/span&gt;&lt;br&gt;&lt;/pre&gt;&lt;/td&gt;&lt;td class=&quot;code&quot;&gt;&lt;pre&gt;&lt;span class=&quot;line&quot;&gt;&amp;gt;&amp;gt;&amp;gt; 或者 /deep/ 或者 ::v-deep&lt;/span&gt;&lt;br&gt;&lt;/pre&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&lt;/figure&gt;

&lt;p&gt;less中一般使用 &amp;gt;&amp;gt;&amp;gt; 或 /deep/&lt;/p&gt;"><link rel="stylesheet" type="text/css" href="/css/normalize.css"><link rel="stylesheet" type="text/css" href="/css/highlight.css"><link rel="stylesheet" type="text/css" href="/css/noise.css"><title>Vue 使用Scss，深度修改局部样式 | 四少爷的blog</title><link rel="Shortcut Icon" type="image/x-icon" href="/favicon.ico"><link rel="alternate" type="application/atom+xml" href="/atom.xml"><meta name="generator" content="Hexo 5.4.0"></head><body><article class="wrapper"><div class="post-main"><div class="nav"><nav class="container"><a class="sidebar-nav-item active" href="/">首页</a><a class="sidebar-nav-item" href="/archives">归档</a><a class="sidebar-nav-item" href="/friends.html">友链</a></nav><div class="container post-meta"><div class="post-tags"><a class="post-tag-none-link" href="/tags/vue/" rel="tag">vue</a></div><div class="post-time">2020-12-16</div></div></div><div class="container post-header"><h1>Vue 使用Scss，深度修改局部样式</h1></div><div class="container post-content"><p>使用scoped后，局部样式，不会影响到全局样式。</p>
<p>如果想在使用了scoped不污染全局样式的情况下，修改局部组件的样式，可以使用深度选择器。</p>
<p>该命令的用法比较简单，比如：</p>
<figure class="highlight css"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">&gt;&gt;&gt; 或者 /deep/ 或者 ::v-deep</span><br></pre></td></tr></table></figure>

<p>less中一般使用 &gt;&gt;&gt; 或 /deep/</p>
<p>scss中一般使用 ::v-deep</p>
<figure class="highlight html"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">style</span> <span class="attr">scoped</span>&gt;</span></span><br><span class="line"></span><br><span class="line">::v-deep .el-tree-node &#123;</span><br><span class="line"><span class="css">    <span class="attribute">border-left</span>: none;</span></span><br><span class="line"><span class="css">    <span class="attribute">border-right</span>: none;</span></span><br><span class="line"><span class="css">    <span class="attribute">border-bottom</span>: none;</span></span><br><span class="line">&#125;</span><br><span class="line"><span class="tag">&lt;/<span class="name">style</span>&gt;</span></span><br></pre></td></tr></table></figure>

<p>(完)</p>

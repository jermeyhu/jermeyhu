gt;32&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;33&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;34&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;35&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;36&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;37&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;38&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;39&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;40&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;41&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;42&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;43&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;44&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;45&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;46&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;47&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;48&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;49&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;50&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;51&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;52&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;53&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;54&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;55&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;56&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;57&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;58&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;59&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;60&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;61&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;62&lt;/span&gt;&lt;br&gt;&lt;/pre&gt;&lt;/td&gt;&lt;td class=&quot;code&quot;&gt;&lt;pre&gt;&lt;span class=&quot;line&quot;&gt;import configparser,requests&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;from time import sleep&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;import datetime&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt; &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;class checkurl(object):&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;    def __init__(self,file):&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;        self.file&amp;#x3D;file&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;        self.cfg&amp;#x3D;configparser.ConfigParser()&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;         &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;    def cfg_load(self):&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;        self.cfg.read(self.file)&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;        self.allurl&amp;#x3D;self.cfg.items(&amp;#39;yuming&amp;#39;)&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;        self.reload&amp;#x3D;self.cfg.get(&amp;#39;time&amp;#39;,&amp;#39;reload&amp;#39;)&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;         &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;    def sendmessage(self,errinfo):&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;        print(&amp;quot;异常通知代码&amp;quot;)&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;        # 需自行实现异常通知功能&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;             &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;    def senderror(self,errcont):&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;        enow&amp;#x3D;datetime.datetime.now()&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;        now&amp;#x3D;enow.strftime(&amp;#39;%Y-%m-%d %H:%M:%S&amp;#39;)&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;        errfile&amp;#x3D;open(&amp;#39;url.log&amp;#39;,&amp;#39;a&amp;#39;)&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;        errfile.write(now)&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;        errfile.write(str(errcont))&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;        errfile.write(&amp;#39;\n&amp;#39;)&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;        errfile.close()&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;             &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;    def cfg_dump(self):&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;        while True:&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;            for k,v in self.allurl:&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;                checknum&amp;#x3D;0&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;                #设置重试错误次数&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;                while checknum &amp;lt; 5:&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;                    try:&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;                        res&amp;#x3D;requests.get(v,timeout&amp;#x3D;20)&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;                        print(v,res.status_code)&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;                        res.close()&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;                        if res.status_code &amp;gt;&amp;#x3D; 400:&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;                            errinfo&amp;#x3D;v+&amp;#39; &amp;#39;+str(res.status_code)&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;                            self.sendmessage(errinfo)&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;                            self.senderror(errinfo)&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;                        break&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;                    except:&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;                        errinfo&amp;#x3D;v+&amp;#39; is error&amp;#39;&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;                        print(errinfo+&amp;#39;\r\n请稍等,正在第&amp;#39;,checknum+1,&amp;#39;次重试...&amp;#39;)&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;                        sleep(1)&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;                        if checknum &amp;#x3D;&amp;#x3D; 4:&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;                            print(&amp;#39;重试仍然无法连接,正在发送微信和邮件报警...&amp;#39;)&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;                            self.sendmessage(errinfo)&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;                            self.senderror(errinfo)&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;                    checknum&amp;#x3D;checknum+1&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;            print(&amp;#39;-----------------------------------&amp;#39;)&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;            nextcheck&amp;#x3D;0&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;            while nextcheck &amp;lt; int(self.reload):&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;                print(&amp;#39;距离下次检测还剩&amp;#39;,int(self.reload)-nextcheck,&amp;#39;秒&amp;#39;)&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;                sleep(1)&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;                nextcheck&amp;#x3D;nextcheck+1&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt; &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;if __name__ &amp;#x3D;&amp;#x3D;&amp;#39;__main__&amp;#39;:&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;    check&amp;#x3D;checkurl(&amp;#39;yuming.ini&amp;#39;)&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;    check.cfg_load()&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;    check.cfg_dump()&lt;/span&gt;&lt;br&gt;&lt;/pre&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&lt;/figure&gt;

/span><br><span class="line">62</span><br></pre></td><td class="code"><pre><span class="line">import configparser,requests</span><br><span class="line">from time import sleep</span><br><span class="line">import datetime</span><br><span class="line"> </span><br><span class="line">class checkurl(object):</span><br><span class="line">    def __init__(self,file):</span><br><span class="line">        self.file&#x3D;file</span><br><span class="line">        self.cfg&#x3D;configparser.ConfigParser()</span><br><span class="line">         </span><br><span class="line">    def cfg_load(self):</span><br><span class="line">        self.cfg.read(self.file)</span><br><span class="line">        self.allurl&#x3D;self.cfg.items(&#39;yuming&#39;)</span><br><span class="line">        self.reload&#x3D;self.cfg.get(&#39;time&#39;,&#39;reload&#39;)</span><br><span class="line">         </span><br><span class="line">    def sendmessage(self,errinfo):</span><br><span class="line">        print(&quot;异常通知代码&quot;)</span><br><span class="line">        # 需自行实现异常通知功能</span><br><span class="line">             </span><br><span class="line">    def senderror(self,errcont):</span><br><span class="line">        enow&#x3D;datetime.datetime.now()</span><br><span class="line">        now&#x3D;enow.strftime(&#39;%Y-%m-%d %H:%M:%S&#39;)</span><br><span class="line">        errfile&#x3D;open(&#39;url.log&#39;,&#39;a&#39;)</span><br><span class="line">        errfile.write(now)</span><br><span class="line">        errfile.write(str(errcont))</span><br><span class="line">        errfile.write(&#39;\n&#39;)</span><br><span class="line">        errfile.close()</span><br><span class="line">             </span><br><span class="line">    def cfg_dump(self):</span><br><span class="line">        while True:</span><br><span class="line">            for k,v in self.allurl:</span><br><span class="line">                checknum&#x3D;0</span><br><span class="line">                #设置重试错误次数</span><br><span class="line">                while checknum &lt; 5:</span><br><span class="line">                    try:</span><br><span class="line">                        res&#x3D;requests.get(v,timeout&#x3D;20)</span><br><span class="line">                        print(v,res.status_code)</span><br><span class="line">                        res.close()</span><br><span class="line">                        if res.status_code &gt;&#x3D; 400:</span><br><span class="line">                            errinfo&#x3D;v+&#39; &#39;+str(res.status_code)</span><br><span class="line">                            self.sendmessage(errinfo)</span><br><span class="line">                            self.senderror(errinfo)</span><br><span class="line">                        break</span><br><span class="line">                    except:</span><br><span class="line">                        errinfo&#x3D;v+&#39; is error&#39;</span><br><span class="line">                        print(errinfo+&#39;\r\n请稍等,正在第&#39;,checknum+1,&#39;次重试...&#39;)</span><br><span class="line">                        sleep(1)</span><br><span class="line">                        if checknum &#x3D;&#x3D; 4:</span><br><span class="line">                            print(&#39;重试仍然无法连接,正在发送微信和邮件报警...&#39;)</span><br><span class="line">                            self.sendmessage(errinfo)</span><br><span class="line">                            self.senderror(errinfo)</span><br><span class="line">                    checknum&#x3D;checknum+1</span><br><span class="line">            print(&#39;-----------------------------------&#39;)</span><br><span class="line">            nextcheck&#x3D;0</span><br><span class="line">            while nextcheck &lt; int(self.reload):</span><br><span class="line">                print(&#39;距离下次检测还剩&#39;,int(self.reload)-nextcheck,&#39;秒&#39;)</span><br><span class="line">                sleep(1)</span><br><span class="line">                nextcheck&#x3D;nextcheck+1</span><br><span class="line"> </span><br><span class="line">if __name__ &#x3D;&#x3D;&#39;__main__&#39;:</span><br><span class="line">    check&#x3D;checkurl(&#39;yuming.ini&#39;)</span><br><span class="line">    check.cfg_load()</span><br><span class="line">    check.cfg_dump()</span><br></pre></td></tr></table></figure>

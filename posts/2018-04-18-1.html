E name NOT IN ( &amp;#39;master&amp;#39;, &amp;#39;model&amp;#39;, &amp;#39;msdb&amp;#39;, &amp;#39;tempdb&amp;#39;, &amp;#39;northwind&amp;#39;,&amp;#39;pubs&amp;#39; )  &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;--获取某数据库的所有表：  &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;SELECT name FROM alarm..sysobjects Where xtype&amp;#x3D;&amp;#39;U&amp;#39; ORDER BY name    &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;--获取所有表名  &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;--XType&amp;#x3D;&amp;#39;U&amp;#39;:表示所有用户表;  &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;--XType&amp;#x3D;&amp;#39;S&amp;#39;:表示所有系统表;  &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;--取表结构  &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;SELECT  c.TABLE_SCHEMA ,  &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;        c.TABLE_NAME ,  &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;        c.COLUMN_NAME ,  &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;        c.DATA_TYPE ,  &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;        c.CHARACTER_MAXIMUM_LENGTH ,  &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;        c.COLUMN_DEFAULT ,  &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;        c.IS_NULLABLE ,  &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;        c.NUMERIC_PRECISION ,  &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;        c.NUMERIC_SCALE  &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;FROM    [INFORMATION_SCHEMA].[COLUMNS] c  &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;WHERE   TABLE_NAME &amp;#x3D; &amp;#39;Alarm&amp;#39;  &lt;/span&gt;&lt;br&gt;&lt;/pre&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&lt;/figure&gt;

39; )  </span><br><span class="line"></span><br><span class="line">--获取某数据库的所有表：  </span><br><span class="line">SELECT name FROM alarm..sysobjects Where xtype&#x3D;&#39;U&#39; ORDER BY name    </span><br><span class="line">--获取所有表名  </span><br><span class="line">--XType&#x3D;&#39;U&#39;:表示所有用户表;  </span><br><span class="line">--XType&#x3D;&#39;S&#39;:表示所有系统表;  </span><br><span class="line"></span><br><span class="line">--取表结构  </span><br><span class="line">SELECT  c.TABLE_SCHEMA ,  </span><br><span class="line">        c.TABLE_NAME ,  </span><br><span class="line">        c.COLUMN_NAME ,  </span><br><span class="line">        c.DATA_TYPE ,  </span><br><span class="line">        c.CHARACTER_MAXIMUM_LENGTH ,  </span><br><span class="line">        c.COLUMN_DEFAULT ,  </span><br><span class="line">        c.IS_NULLABLE ,  </span><br><span class="line">        c.NUMERIC_PRECISION ,  </span><br><span class="line">        c.NUMERIC_SCALE  </span><br><span class="line">FROM    [INFORMATION_SCHEMA].[COLUMNS] c  </span><br><span class="line">WHERE   TABLE_NAME &#x3D; &#39;Alarm&#39;  </span><br></pre></td></tr></table></figure>

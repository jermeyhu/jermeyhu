&lt;p&gt;下载解压后目录和nginx差不多.所以就直接上配置文件了.&lt;/p&gt;"><link rel="stylesheet" type="text/css" href="/css/normalize.css"><link rel="stylesheet" type="text/css" href="/css/highlight.css"><link rel="stylesheet" type="text/css" href="/css/noise.css"><title>NGINX + LUA 实现身份验证​ | 四少爷的blog</title><link rel="Shortcut Icon" type="image/x-icon" href="/favicon.ico"><link rel="alternate" type="application/atom+xml" href="/atom.xml"><meta name="generator" content="Hexo 5.4.0"></head><body><article class="wrapper"><div class="post-main"><div class="nav"><nav class="container"><a class="sidebar-nav-item active" href="/">首页</a><a class="sidebar-nav-item" href="/archives">归档</a><a class="sidebar-nav-item" href="/friends.html">友链</a></nav><div class="container post-meta"><div class="post-tags"><a class="post-tag-none-link" href="/tags/nginx/" rel="tag">nginx</a></div><div class="post-time">2018-07-09</div></div></div><div class="container post-header"><h1>NGINX + LUA 实现身份验证​</h1></div><div class="container post-content"><p>以前所有的身份验证都是写在代码里面的.后来有一天,遇到个没有认证功能的web,需要从我们的服务器出去…..折腾了这个东西.</p>
<p>说是nginx + lua 其实我说谎了…..我使用的是OpenResty</p>
<p>没有找到 win平台nginx + lua的安装教程</p>
<p>下载地址:<a target="_blank" rel="noopener" href="http://openresty.org/cn/download.html">官网下载页面</a></p>
<p>下载解压后目录和nginx差不多.所以就直接上配置文件了.</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br></pre></td><td class="code"><pre><span class="line">server &#123;</span><br><span class="line">    listen       80;</span><br><span class="line">    server_name  localhost;</span><br><span class="line">    location &#x2F; &#123;</span><br><span class="line">        proxy_pass   http:&#x2F;&#x2F;www.test.com&#x2F;;</span><br><span class="line">        proxy_redirect default;</span><br><span class="line"></span><br><span class="line">        # 使用lua进行权限验证</span><br><span class="line">        access_by_lua &#39;</span><br><span class="line">        -- 判断名为Token的Cookie是否存在</span><br><span class="line">        local cookie_name &#x3D; &quot;cookie_Token&quot;</span><br><span class="line">        if ngx.var[cookie_name] &#x3D;&#x3D; null then</span><br><span class="line">            -- 如果cookie不存在返回401错误</span><br><span class="line">            ngx.exit(ngx.HTTP_UNAUTHORIZED) </span><br><span class="line"></span><br><span class="line">            -- 也可以直接跳转到登录地址</span><br><span class="line">            -- return ngx.redirect(&quot;http:&#x2F;&#x2F;登录地址&quot;)</span><br><span class="line">        end</span><br><span class="line">        &#39;;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<p>我这里是读取cookie并判断cookie的真实性(其实只判断了cookie是否存在).</p>
<p>每个系统判断的方法不一样,所以没有上判断的代码.</p>
<p>(完)</p>

l &amp;#x3D; &amp;quot;trial&amp;quot;.getBytes();&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	    org.junit.Assert.assertArrayEquals(&amp;quot;failure - byte arrays not same&amp;quot;, expected, actual);&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	  &amp;#125;&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt; &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	  @Test&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	  public void testAssertEquals() &amp;#123;&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	    org.junit.Assert.assertEquals(&amp;quot;failure - strings not same&amp;quot;, 5l, 5l);&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	  &amp;#125;&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt; &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	  @Test&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	  public void testAssertFalse() &amp;#123;&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	    org.junit.Assert.assertFalse(&amp;quot;failure - should be false&amp;quot;, false);&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	  &amp;#125;&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt; &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	  @Test&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	  public void testAssertNotNull() &amp;#123;&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	    org.junit.Assert.assertNotNull(&amp;quot;should not be null&amp;quot;, new Object());&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	  &amp;#125;&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt; &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	  @Test&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	  public void testAssertNotSame() &amp;#123;&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	    org.junit.Assert.assertNotSame(&amp;quot;should not be same Object&amp;quot;, new Object(), new Object());&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	  &amp;#125;&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt; &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	  @Test&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	  public void testAssertNull() &amp;#123;&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	    org.junit.Assert.assertNull(&amp;quot;should be null&amp;quot;, null);&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	  &amp;#125;&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt; &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	  @Test&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	  public void testAssertSame() &amp;#123;&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	    Integer aNumber &amp;#x3D; Integer.valueOf(768);&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	    org.junit.Assert.assertSame(&amp;quot;should be same&amp;quot;, aNumber, aNumber);&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	  &amp;#125;&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt; &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	  &amp;#x2F;&amp;#x2F; JUnit Matchers assertThat&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	  @Test&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	  public void testAssertThatBothContainsString() &amp;#123;&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	    org.junit.Assert.assertThat(&amp;quot;albumen&amp;quot;, both(containsString(&amp;quot;a&amp;quot;)).and(containsString(&amp;quot;b&amp;quot;)));&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	  &amp;#125;&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt; &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	  @Test&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	  public void testAssertThathasItemsContainsString() &amp;#123;&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&

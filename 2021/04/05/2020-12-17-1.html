<!DOCTYPE html><html><head><meta http-equiv="content-type" content="text/html; charset=utf-8"><meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport"><meta content="yes" name="apple-mobile-web-app-capable"><meta content="black-translucent" name="apple-mobile-web-app-status-bar-style"><meta content="telephone=no" name="format-detection"><meta name="description" content="&lt;h1 id=&quot;Vue-使用Scss，深度修改局部样式&quot;&gt;&lt;a href=&quot;#Vue-使用Scss，深度修改局部样式&quot; class=&quot;headerlink&quot; title=&quot;Vue 使用Scss，深度修改局部样式&quot;&gt;&lt;/a&gt;Vue 使用Scss，深度修改局部样式&lt;/h1&gt;&lt;p&gt;使用scoped后，局部样式，不会影响到全局样式。&lt;/p&gt;
&lt;p&gt;如果想在使用了scoped不污染全局样式的情况下，修改局部组件的样式，可以使用深度选择器。&lt;/p&gt;
&lt;p&gt;该命令的用法比较简单，比如：&lt;/p&gt;
&lt;figure class=&quot;highlight css&quot;&gt;&lt;table&gt;&lt;tr&gt;&lt;td class=&quot;gutter&quot;&gt;&lt;pre&gt;&lt;span class=&quot;line&quot;&gt;1&lt;/span&gt;&lt;br&gt;&lt;/pre&gt;&lt;/td&gt;&lt;td class=&quot;code&quot;&gt;&lt;pre&gt;&lt;span class=&quot;line&quot;&gt;&amp;gt;&amp;gt;&amp;gt; 或者 /deep/ 或者 ::v-deep&lt;/span&gt;&lt;br&gt;&lt;/pre&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&lt;/figure&gt;"><link rel="stylesheet" type="text/css" href="/css/normalize.css"><link rel="stylesheet" type="text/css" href="/css/highlight.css"><link rel="stylesheet" type="text/css" href="/css/noise.css"><title> | 四少爷的blog</title><link rel="Shortcut Icon" type="image/x-icon" href="/favicon.ico"><link rel="alternate" type="application/atom+xml" href="/atom.xml"><meta name="generator" content="Hexo 5.4.0"></head><body><article class="wrapper"><div class="post-main"><div class="nav"><nav class="container"><a class="sidebar-nav-item active" href="/">首页</a><a class="sidebar-nav-item" href="/archives">归档</a></nav><div class="container post-meta"><div class="post-time">2021-04-05</div></div></div><div class="container post-header"><h1></h1></div><div class="container post-toc"><details class="toc"><summary class="toc-accordion">目录</summary><ol class="toc"><li class="toc-item toc-level-1"><a class="toc-link" href="#Vue-%E4%BD%BF%E7%94%A8Scss%EF%BC%8C%E6%B7%B1%E5%BA%A6%E4%BF%AE%E6%94%B9%E5%B1%80%E9%83%A8%E6%A0%B7%E5%BC%8F"><span class="toc-number">1.</span> <span class="toc-text">Vue 使用Scss，深度修改局部样式</span></a></li></ol></details></div><div class="container post-content"><h1 id="Vue-使用Scss，深度修改局部样式"><a href="#Vue-使用Scss，深度修改局部样式" class="headerlink" title="Vue 使用Scss，深度修改局部样式"></a>Vue 使用Scss，深度修改局部样式</h1><p>使用scoped后，局部样式，不会影响到全局样式。</p>
<p>如果想在使用了scoped不污染全局样式的情况下，修改局部组件的样式，可以使用深度选择器。</p>
<p>该命令的用法比较简单，比如：</p>
<figure class="highlight css"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">&gt;&gt;&gt; 或者 /deep/ 或者 ::v-deep</span><br></pre></td></tr></table></figure>

<p>less中一般使用 &gt;&gt;&gt; 或 /deep/</p>
<p>scss中一般使用 ::v-deep</p>
<figure class="highlight html"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">style</span> <span class="attr">scoped</span>&gt;</span></span><br><span class="line"></span><br><span class="line">::v-deep .el-tree-node &#123;</span><br><span class="line"><span class="css">    <span class="attribute">border-left</span>: none;</span></span><br><span class="line"><span class="css">    <span class="attribute">border-right</span>: none;</span></span><br><span class="line"><span class="css">    <span class="attribute">border-bottom</span>: none;</span></span><br><span class="line">&#125;</span><br><span class="line"><span class="tag">&lt;/<span class="name">style</span>&gt;</span></span><br></pre></td></tr></table></figure>

<p>(完)</p>

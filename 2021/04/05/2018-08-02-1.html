<!DOCTYPE html><html><head><meta http-equiv="content-type" content="text/html; charset=utf-8"><meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport"><meta content="yes" name="apple-mobile-web-app-capable"><meta content="black-translucent" name="apple-mobile-web-app-status-bar-style"><meta content="telephone=no" name="format-detection"><meta name="description" content="&lt;h1 id=&quot;java上传图片，压缩、更改尺寸等导致变色（表层蒙上一层红色）&quot;&gt;&lt;a href=&quot;#java上传图片，压缩、更改尺寸等导致变色（表层蒙上一层红色）&quot; class=&quot;headerlink&quot; title=&quot;java上传图片，压缩、更改尺寸等导致变色（表层蒙上一层红色）&quot;&gt;&lt;/a&gt;java上传图片，压缩、更改尺寸等导致变色（表层蒙上一层红色）&lt;/h1&gt;&lt;p&gt;做项目的时候遇到要对图片尺寸做处理，结果就会导致上传的图片会蒙上一层红色，代码如下&lt;/p&gt;
&lt;figure class=&quot;highlight plain&quot;&gt;&lt;table&gt;&lt;tr&gt;&lt;td class=&quot;gutter&quot;&gt;&lt;pre&gt;&lt;span class=&quot;line&quot;&gt;1&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;2&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;3&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;4&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;5&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;6&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;7&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;8&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;9&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;10&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;11&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;12&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;13&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;14&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;15&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;16&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;17&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;18&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;19&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;20&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;21&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;22&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;23&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;24&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;25&lt;/span&gt;&lt;br&gt;&lt;/pre&gt;&lt;/td&gt;&lt;td class=&quot;code&quot;&gt;&lt;pre&gt;&lt;span class=&quot;line&quot;&gt;public void updateFileSize(String filePath) throws Exception &amp;#123;&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;		&amp;#x2F;&amp;#x2F; 读取图片&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;		BufferedInputStream in &amp;#x3D; new BufferedInputStream(new FileInputStream(filePath));&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;		&amp;#x2F;&amp;#x2F; 字节流转图片对象&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;		Image bi &amp;#x3D; ImageIO.read(in);&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;		&amp;#x2F;&amp;#x2F; 获取图像的高度，宽度&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;		int height &amp;#x3D; bi.getHeight(null);&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;		int width &amp;#x3D; bi.getWidth(null);&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt; &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;		int toHeight &amp;#x3D; GlobalConstant.BASE_FILE_SIZE_NORMAl;&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;		int toWidth &amp;#x3D; GlobalConstant.BASE_FILE_SIZE_NORMAl;&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt; &lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;		if (toHeight !&amp;#x3D; height &amp;amp;&amp;amp; toWidth !&amp;#x3D; width) &amp;#123;&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;			&amp;#x2F;&amp;#x2F; 构建图片流&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;			BufferedImage tag &amp;#x3D; new BufferedImage(toWidth, toHeight, BufferedImage.TYPE_INT_RGB);&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;			&amp;#x2F;&amp;#x2F; 绘制改变尺寸后的图&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;			tag.getGraphics().drawImage(bi, 0, 0, toWidth, toHeight, null);&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;			&amp;#x2F;&amp;#x2F; 输出流&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;			String imageType &amp;#x3D; getFormatName(new File(filePath));&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;			BufferedOutputStream out &amp;#x3D; new BufferedOutputStream(new FileOutputStream(filePath));&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;			ImageIO.write(tag, imageType, out);&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;			in.close();&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;			out.close();&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;		&amp;#125;&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;	&amp;#125;&lt;/span&gt;&lt;br&gt;&lt;/pre&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&lt;/figure&gt;

&lt;p&gt;原图&lt;/p&gt;
&lt;p&gt;&lt;img src=&quot;/image/2018-08-02-1-1.jpg&quot;&gt;&lt;/p&gt;"><link rel="stylesheet" type="text/css" href="/css/normalize.css"><link rel="stylesheet" type="text/css" href="/css/highlight.css"><link rel="stylesheet" type="text/css" href="/css/noise.css"><title> | 四少爷的blog</title><link rel="Shortcut Icon" type="image/x-icon" href="/favicon.ico"><link rel="alternate" type="application/atom+xml" href="/atom.xml"><meta name="generator" content="Hexo 5.4.0"></head><body><article class="wrapper"><div class="post-main"><div class="nav"><nav class="container"><a class="sidebar-nav-item active" href="/">首页</a><a class="sidebar-nav-item" href="/archives">归档</a></nav><div class="container post-meta"><div class="post-time">2021-04-05</div></div></div><div class="container post-header"><h1></h1></div><div class="container post-toc"><details class="toc"><summary class="toc-accordion">目录</summary><ol class="toc"><li class="toc-item toc-level-1"><a class="toc-link" href="#java%E4%B8%8A%E4%BC%A0%E5%9B%BE%E7%89%87%EF%BC%8C%E5%8E%8B%E7%BC%A9%E3%80%81%E6%9B%B4%E6%94%B9%E5%B0%BA%E5%AF%B8%E7%AD%89%E5%AF%BC%E8%87%B4%E5%8F%98%E8%89%B2%EF%BC%88%E8%A1%A8%E5%B1%82%E8%92%99%E4%B8%8A%E4%B8%80%E5%B1%82%E7%BA%A2%E8%89%B2%EF%BC%89"><span class="toc-number">1.</span> <span class="toc-text">java上传图片，压缩、更改尺寸等导致变色（表层蒙上一层红色）</span></a></li></ol></details></div><div class="container post-content"><h1 id="java上传图片，压缩、更改尺寸等导致变色（表层蒙上一层红色）"><a href="#java上传图片，压缩、更改尺寸等导致变色（表层蒙上一层红色）" class="headerlink" title="java上传图片，压缩、更改尺寸等导致变色（表层蒙上一层红色）"></a>java上传图片，压缩、更改尺寸等导致变色（表层蒙上一层红色）</h1><p>做项目的时候遇到要对图片尺寸做处理，结果就会导致上传的图片会蒙上一层红色，代码如下</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br></pre></td><td class="code"><pre><span class="line">public void updateFileSize(String filePath) throws Exception &#123;</span><br><span class="line">		&#x2F;&#x2F; 读取图片</span><br><span class="line">		BufferedInputStream in &#x3D; new BufferedInputStream(new FileInputStream(filePath));</span><br><span class="line">		&#x2F;&#x2F; 字节流转图片对象</span><br><span class="line">		Image bi &#x3D; ImageIO.read(in);</span><br><span class="line">		&#x2F;&#x2F; 获取图像的高度，宽度</span><br><span class="line">		int height &#x3D; bi.getHeight(null);</span><br><span class="line">		int width &#x3D; bi.getWidth(null);</span><br><span class="line"> </span><br><span class="line">		int toHeight &#x3D; GlobalConstant.BASE_FILE_SIZE_NORMAl;</span><br><span class="line">		int toWidth &#x3D; GlobalConstant.BASE_FILE_SIZE_NORMAl;</span><br><span class="line"> </span><br><span class="line">		if (toHeight !&#x3D; height &amp;&amp; toWidth !&#x3D; width) &#123;</span><br><span class="line">			&#x2F;&#x2F; 构建图片流</span><br><span class="line">			BufferedImage tag &#x3D; new BufferedImage(toWidth, toHeight, BufferedImage.TYPE_INT_RGB);</span><br><span class="line">			&#x2F;&#x2F; 绘制改变尺寸后的图</span><br><span class="line">			tag.getGraphics().drawImage(bi, 0, 0, toWidth, toHeight, null);</span><br><span class="line">			&#x2F;&#x2F; 输出流</span><br><span class="line">			String imageType &#x3D; getFormatName(new File(filePath));</span><br><span class="line">			BufferedOutputStream out &#x3D; new BufferedOutputStream(new FileOutputStream(filePath));</span><br><span class="line">			ImageIO.write(tag, imageType, out);</span><br><span class="line">			in.close();</span><br><span class="line">			out.close();</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br></pre></td></tr></table></figure>

<p>原图</p>
<p><img src="/image/2018-08-02-1-1.jpg"></p>
<p>处理后的图</p>
<p><img src="/image/2018-08-02-1-2.jpg"></p>
<p>浪费了很多时间，换各种处理图片的方法都没找到问题，才发现只要使用ImageIO.read(in)读取图片可能就会导致变色。可通过BufferedImage读取图片，即可解决问题。代码如下：</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">Image src &#x3D; Toolkit.getDefaultToolkit().getImage(filePath);</span><br><span class="line">BufferedImage image &#x3D; this.toBufferedImage(src);&#x2F;&#x2F; Image to BufferedImage</span><br></pre></td></tr></table></figure>

<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br></pre></td><td class="code"><pre><span class="line">public BufferedImage toBufferedImage(Image image) &#123;</span><br><span class="line">		if (image instanceof BufferedImage) &#123;</span><br><span class="line">			return (BufferedImage) image;</span><br><span class="line">		&#125;</span><br><span class="line">		&#x2F;&#x2F; This code ensures that all the pixels in the image are loaded</span><br><span class="line">		image &#x3D; new ImageIcon(image).getImage();</span><br><span class="line">		BufferedImage bimage &#x3D; null;</span><br><span class="line">		GraphicsEnvironment ge &#x3D; GraphicsEnvironment.getLocalGraphicsEnvironment();</span><br><span class="line">		try &#123;</span><br><span class="line">			int transparency &#x3D; Transparency.OPAQUE;</span><br><span class="line">			GraphicsDevice gs &#x3D; ge.getDefaultScreenDevice();</span><br><span class="line">			GraphicsConfiguration gc &#x3D; gs.getDefaultConfiguration();</span><br><span class="line">			bimage &#x3D; gc.createCompatibleImage(image.getWidth(null), image.getHeight(null), transparency);</span><br><span class="line">		&#125; catch (HeadlessException e) &#123;</span><br><span class="line">			&#x2F;&#x2F; The system does not have a screen</span><br><span class="line">		&#125;</span><br><span class="line">		if (bimage &#x3D;&#x3D; null) &#123;</span><br><span class="line">			&#x2F;&#x2F; Create a buffered image using the default color model</span><br><span class="line">			int type &#x3D; BufferedImage.TYPE_INT_RGB;</span><br><span class="line">			bimage &#x3D; new BufferedImage(image.getWidth(null), image.getHeight(null), type);</span><br><span class="line">		&#125;</span><br><span class="line">		&#x2F;&#x2F; Copy image to buffered image</span><br><span class="line">		Graphics g &#x3D; bimage.createGraphics();</span><br><span class="line">		&#x2F;&#x2F; Paint the image onto the buffered image</span><br><span class="line">		g.drawImage(image, 0, 0, null);</span><br><span class="line">		g.dispose();</span><br><span class="line">		return bimage;</span><br><span class="line">	&#125;</span><br></pre></td></tr></table></figure>

<p>(完)</p>

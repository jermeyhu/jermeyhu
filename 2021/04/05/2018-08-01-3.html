59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br></pre></td><td class="code"><pre><span class="line">package test;</span><br><span class="line"> </span><br><span class="line">import java.awt.image.BufferedImage;</span><br><span class="line">import java.io.File;</span><br><span class="line">import java.io.IOException;</span><br><span class="line"> </span><br><span class="line">import javax.imageio.ImageIO;</span><br><span class="line"> </span><br><span class="line">import org.apache.pdfbox.pdmodel.PDDocument;</span><br><span class="line">import org.apache.pdfbox.rendering.PDFRenderer;</span><br><span class="line"> </span><br><span class="line">import com.lowagie.text.pdf.PdfReader;</span><br><span class="line"> </span><br><span class="line">public class PDF2IMAGE &#123;</span><br><span class="line">	public static void main(String[] args) &#123;</span><br><span class="line">		pdf2Image(&quot;D:&#x2F;1.pdf&quot;, &quot;D:&#x2F;pdf&quot;, 300);</span><br><span class="line">	&#125;</span><br><span class="line"> </span><br><span class="line">	&#x2F;***</span><br><span class="line">	 * PDF文件转PNG图片，全部页数</span><br><span class="line">	 * </span><br><span class="line">	 * @param PdfFilePath pdf完整路径</span><br><span class="line">	 * @param imgFilePath 图片存放的文件夹</span><br><span class="line">	 * @param dpi dpi越大转换后越清晰，相对转换速度越慢</span><br><span class="line">	 * @return</span><br><span class="line">	 *&#x2F;</span><br><span class="line">	public static void pdf2Image(String PdfFilePath, String dstImgFolder, int dpi) &#123;</span><br><span class="line">		File file &#x3D; new File(PdfFilePath);</span><br><span class="line">		PDDocument pdDocument;</span><br><span class="line">		try &#123;</span><br><span class="line">			String imgPDFPath &#x3D; file.getParent();</span><br><span class="line">			int dot &#x3D; file.getName().lastIndexOf(&#39;.&#39;);</span><br><span class="line">			String imagePDFName &#x3D; file.getName().substring(0, dot); &#x2F;&#x2F; 获取图片文件名</span><br><span class="line">			String imgFolderPath &#x3D; null;</span><br><span class="line">			if (dstImgFolder.equals(&quot;&quot;)) &#123;</span><br><span class="line">				imgFolderPath &#x3D; imgPDFPath + File.separator + imagePDFName;&#x2F;&#x2F; 获取图片存放的文件夹路径</span><br><span class="line">			&#125; else &#123;</span><br><span class="line">				imgFolderPath &#x3D; dstImgFolder + File.separator + imagePDFName;</span><br><span class="line">			&#125;</span><br><span class="line"> </span><br><span class="line">			if (createDirectory(imgFolderPath)) &#123;</span><br><span class="line"> </span><br><span class="line">				pdDocument &#x3D; PDDocument.load(file);</span><br><span class="line">				PDFRenderer renderer &#x3D; new PDFRenderer(pdDocument);</span><br><span class="line">				&#x2F;* dpi越大转换后越清晰，相对转换速度越慢 *&#x2F;</span><br><span class="line">				PdfReader reader &#x3D; new PdfReader(PdfFilePath);</span><br><span class="line">				int pages &#x3D; reader.getNumberOfPages();</span><br><span class="line">				StringBuffer imgFilePath &#x3D; null;</span><br><span class="line">				for (int i &#x3D; 0; i &lt; pages; i++) &#123;</span><br><span class="line">					String imgFilePathPrefix &#x3D; imgFolderPath + File.separator + imagePDFName;</span><br><span class="line">					imgFilePath &#x3D; new StringBuffer();</span><br><span class="line">					imgFilePath.append(imgFilePathPrefix);</span><br><span class="line">					imgFilePath.append(&quot;_&quot;);</span><br><span class="line">					imgFilePath.append(String.valueOf(i + 1));</span><br><span class="line">					imgFilePath.append(&quot;.png&quot;);</span><br><span class="line">					File dstFile &#x3D; new File(imgFilePath.toString());</span><br><span class="line">					BufferedImage image &#x3D; renderer.renderImageWithDPI(i, dpi);</span><br><span class="line">					ImageIO.write(image, &quot;png&quot;, dstFile);</span><br><span class="line">				&#125;</span><br><span class="line">				System.out.println(&quot;PDF文档转PNG图片成功！&quot;);</span><br><span class="line"> </span><br><span class="line">			&#125; else &#123;</span><br><span class="line">				System.out.println(&quot;PDF文档转PNG图片失败：&quot; + &quot;创建&quot; + imgFolderPath + &quot;失败&quot;);</span><br><span class="line">			&#125;</span><br><span class="line"> </span><br><span class="line">		&#125; catch (IOException e) &#123;</span><br><span class="line">			e.printStackTrace();</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line"> </span><br><span class="line">	private static boolean createDirectory(String folder) &#123;</span><br><span class="line">		File dir &#x3D; new File(folder);</span><br><span class="line">		if (dir.exists()) &#123;</span><br><span class="line">			return true;</span><br><span class="line">		&#125; else &#123;</span><br><span class="line">			return dir.mkdirs();</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line"> </span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

s="line">            event.returnValue = <span class="literal">false</span>;</span><br><span class="line">            <span class="keyword">return</span>;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">var</span> re = <span class="regexp">/x/</span>;</span><br><span class="line">    <span class="keyword">var</span> i = <span class="number">0</span>;</span><br><span class="line"></span><br><span class="line">    re.toString = <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</span><br><span class="line">        ++i;</span><br><span class="line">        <span class="keyword">if</span> (i &gt; <span class="number">1</span>) &#123;</span><br><span class="line">            <span class="keyword">var</span> opened = <span class="built_in">window</span>.open(<span class="string">&#x27;about:blank&#x27;</span>, <span class="string">&#x27;_self&#x27;</span>);</span><br><span class="line">            opened.opener = <span class="literal">null</span>;</span><br><span class="line">            opened.close();</span><br><span class="line">            <span class="built_in">window</span>.close();</span><br><span class="line">            alert(<span class="string">&quot;頁面已停止！抱歉！您沒有權限訪問源碼！&quot;</span>);</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;;</span><br><span class="line">    <span class="built_in">console</span>.log(re);</span><br><span class="line">&#125;)</span><br><span class="line"><span class="comment">//#endregion</span></span><br></pre></td></tr></table></figure>

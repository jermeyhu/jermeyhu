<!DOCTYPE html><html><head><meta http-equiv="content-type" content="text/html; charset=utf-8"><meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport"><meta content="yes" name="apple-mobile-web-app-capable"><meta content="black-translucent" name="apple-mobile-web-app-status-bar-style"><meta content="telephone=no" name="format-detection"><meta name="description" content="&lt;h1 id=&quot;Ubuntu安装pycurl&quot;&gt;&lt;a href=&quot;#Ubuntu安装pycurl&quot; class=&quot;headerlink&quot; title=&quot;Ubuntu安装pycurl&quot;&gt;&lt;/a&gt;Ubuntu安装pycurl&lt;/h1&gt;&lt;p&gt;在Ubuntu 16.04上安装pycurl时大致会遇到一下两个问题：&lt;/p&gt;
&lt;ol&gt;
&lt;li&gt;&lt;p&gt;在使用pip install pycurl是报curl_config no found错误&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;&lt;p&gt;gnutls.h: No such file or directory&lt;/p&gt;
&lt;/li&gt;
&lt;/ol&gt;
&lt;p&gt;解决办法：&lt;/p&gt;
&lt;figure class=&quot;highlight plain&quot;&gt;&lt;table&gt;&lt;tr&gt;&lt;td class=&quot;gutter&quot;&gt;&lt;pre&gt;&lt;span class=&quot;line&quot;&gt;1&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;2&lt;/span&gt;&lt;br&gt;&lt;/pre&gt;&lt;/td&gt;&lt;td class=&quot;code&quot;&gt;&lt;pre&gt;&lt;span class=&quot;line&quot;&gt;sudo apt-get install libcurl4-gnutls-dev&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;line&quot;&gt;sudo apt-get install libghc-gnutls-dev&lt;/span&gt;&lt;br&gt;&lt;/pre&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&lt;/figure&gt;"><link rel="stylesheet" type="text/css" href="/css/normalize.css"><link rel="stylesheet" type="text/css" href="/css/highlight.css"><link rel="stylesheet" type="text/css" href="/css/noise.css"><title> | 四少爷的blog</title><link rel="Shortcut Icon" type="image/x-icon" href="/favicon.ico"><link rel="alternate" type="application/atom+xml" href="/atom.xml"><meta name="generator" content="Hexo 5.4.0"></head><body><article class="wrapper"><div class="post-main"><div class="nav"><nav class="container"><a class="sidebar-nav-item active" href="/">首页</a><a class="sidebar-nav-item" href="/archives">归档</a></nav><div class="container post-meta"><div class="post-time">2021-04-05</div></div></div><div class="container post-header"><h1></h1></div><div class="container post-toc"><details class="toc"><summary class="toc-accordion">目录</summary><ol class="toc"><li class="toc-item toc-level-1"><a class="toc-link" href="#Ubuntu%E5%AE%89%E8%A3%85pycurl"><span class="toc-number">1.</span> <span class="toc-text">Ubuntu安装pycurl</span></a></li></ol></details></div><div class="container post-content"><h1 id="Ubuntu安装pycurl"><a href="#Ubuntu安装pycurl" class="headerlink" title="Ubuntu安装pycurl"></a>Ubuntu安装pycurl</h1><p>在Ubuntu 16.04上安装pycurl时大致会遇到一下两个问题：</p>
<ol>
<li><p>在使用pip install pycurl是报curl_config no found错误</p>
</li>
<li><p>gnutls.h: No such file or directory</p>
</li>
</ol>
<p>解决办法：</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">sudo apt-get install libcurl4-gnutls-dev</span><br><span class="line">sudo apt-get install libghc-gnutls-dev</span><br></pre></td></tr></table></figure>

<p>最后通过pip进行安装：</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">pip install pycurl</span><br></pre></td></tr></table></figure>

<p>(完)</p>

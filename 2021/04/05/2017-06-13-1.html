<!DOCTYPE html><html><head><meta http-equiv="content-type" content="text/html; charset=utf-8"><meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport"><meta content="yes" name="apple-mobile-web-app-capable"><meta content="black-translucent" name="apple-mobile-web-app-status-bar-style"><meta content="telephone=no" name="format-detection"><meta name="description" content="&lt;h1 id=&quot;Centos安装EPEL扩展源&quot;&gt;&lt;a href=&quot;#Centos安装EPEL扩展源&quot; class=&quot;headerlink&quot; title=&quot;Centos安装EPEL扩展源&quot;&gt;&lt;/a&gt;Centos安装EPEL扩展源&lt;/h1&gt;&lt;p&gt;Centos官方源很多软件都没有，编译安装又比较麻烦，可以安装EPEL源解决此问题。&lt;br&gt;EPEL即Extra Packages for Enterprise Linux，也就是为企业级 Linux提供的扩展软件源，适用于 RHEL，CentOS，Scientific Linux系统。&lt;/p&gt;

t(Arrays.asList(&quot;one&quot;, &quot;two&quot;, &quot;three&quot;), hasItems(&quot;one&quot;, &quot;three&quot;));</span><br><span class="line">	  &#125;</span><br><span class="line"> </span><br><span class="line">	  @Test</span><br><span class="line">	  public void testAssertThatEveryItemContainsString() &#123;</span><br><span class="line">	    org.junit.Assert.assertThat(Arrays.asList(new String[] &#123; &quot;fun&quot;, &quot;ban&quot;, &quot;net&quot; &#125;), everyItem(containsString(&quot;n&quot;)));</span><br><span class="line">	  &#125;</span><br><span class="line"> </span><br><span class="line">	  &#x2F;&#x2F; Core Hamcrest Matchers with assertThat</span><br><span class="line">	  @Test</span><br><span class="line">	  public void testAssertThatHamcrestCoreMatchers() &#123;</span><br><span class="line">	    assertThat(&quot;good&quot;, allOf(equalTo(&quot;good&quot;), startsWith(&quot;good&quot;)));</span><br><span class="line">	    assertThat(&quot;good&quot;, not(allOf(equalTo(&quot;bad&quot;), equalTo(&quot;good&quot;))));</span><br><span class="line">	    assertThat(&quot;good&quot;, anyOf(equalTo(&quot;bad&quot;), equalTo(&quot;good&quot;)));</span><br><span class="line">	    assertThat(7, not(CombinableMatcher.&lt;Integer&gt; either(equalTo(3)).or(equalTo(4))));</span><br><span class="line">	    assertThat(new Object(), not(sameInstance(new Object())));</span><br><span class="line">	  &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
